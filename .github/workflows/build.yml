name: Build

on:
  # Полностью убрали авто-пуш и реквесты. Воркфлоу спит, пока не пнешь вручную.
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Что компилировать?'
        required: true
        default: 'All'
        type: choice
        options:
          - 'All'
          - 'Only Game + ModLoader'
          - 'Only All Mods'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. Сборка ядра игры
      - name: Build Core and ModLoader
        if: "${{ github.event.inputs.build_target == 'All' || github.event.inputs.build_target == 'Only Game + ModLoader' }}"
        run: ./gradlew jar fatJar extractNatives

      # 2. Динамический билд всех папок из mods-src/
      - name: Compile All Mods
        if: "${{ github.event.inputs.build_target == 'All' || github.event.inputs.build_target == 'Only All Mods' }}"
        run: |
          mkdir -p build/libs/mods
          
          # Если собираем ТОЛЬКО моды на чистом раннере, быстро подтянем ядро для classpath
          if [ ! -f build/libs/minecraft-rd-161807.jar ]; then
            echo "Сборка ядра для зависимостей..."
            ./gradlew jar fatJar
          fi
          
          if [ -d "mods-src" ]; then
            for mod_dir in mods-src/*; do
              if [ -d "$mod_dir" ]; then
                mod_name=$(basename "$mod_dir")
                echo "=== Найдена папка мода: $mod_name ==="
                
                mkdir -p "mods-build/$mod_name"
                
                # Ищем все исходники в подпапке конкретного мода
                find "$mod_dir" -name "*.java" > sources.txt
                if [ -s sources.txt ]; then
                  javac -d "mods-build/$mod_name" \
                    -cp "build/libs/minecraft-rd-161807.jar:build/libs/minecraft-rd-161807-all.jar" \
                    @sources.txt
                  
                  jar cf "build/libs/mods/${mod_name}.jar" -C "mods-build/$mod_name" .
                  echo "Собрано: build/libs/mods/${mod_name}.jar"
                else
                  echo "Нет .java файлов в $mod_name"
                fi
                rm -f sources.txt
              fi
            done
          else
            echo "Папка mods-src пуста или не существует."
          fi

      # ─── Выгрузка артефактов ─────────────────────────────────────────────

      - name: Upload modloader jar
        if: "${{ github.event.inputs.build_target == 'All' || github.event.inputs.build_target == 'Only Game + ModLoader' }}"
        uses: actions/upload-artifact@v4
        with:
          name: mc-161807-modloader
          path: build/libs/minecraft-rd-161807.jar

      - name: Upload fat jar
        if: "${{ github.event.inputs.build_target == 'All' || github.event.inputs.build_target == 'Only Game + ModLoader' }}"
        uses: actions/upload-artifact@v4
        with:
          name: mc-161807-modloader-all
          path: build/libs/minecraft-rd-161807-all.jar

      - name: Upload All Compiled Mods
        if: "${{ github.event.inputs.build_target == 'All' || github.event.inputs.build_target == 'Only All Mods' }}"
        uses: actions/upload-artifact@v4
        with:
          name: compiled-minecraft-mods
          path: build/libs/mods/*.jar

      - name: Upload natives (macOS)
        if: "${{ github.event.inputs.build_target == 'All' || github.event.inputs.build_target == 'Only Game + ModLoader' }}"
        uses: actions/upload-artifact@v4
        with:
          name: natives-macos
          path: run/natives/*.dylib
