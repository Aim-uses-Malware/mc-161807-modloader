name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. Собираем ядро игры и модлоадер
      - name: Build Core and ModLoader
        run: ./gradlew jar fatJar extractNatives

      # 2. Компилируем SprintMod, используя скомпилированное ядро и LWJGL в classpath
      - name: Compile SprintMod
        run: |
          mkdir -p mods-build/classes
          mkdir -p build/libs/mods
          
          # Находим, где лежат зависимости (распакованный fatJar или папка сборки gradle)
          # Для простоты компилируем прямо против скомпилированного minecraft-rd-161807.jar
          javac -d mods-build/classes \
            -cp "build/libs/minecraft-rd-161807.jar:build/libs/minecraft-rd-161807-all.jar" \
            mods-src/sprintmod/src/mymod/SprintMod.java

      # 3. Упаковываем скомпилированный класс мода в SprintMod.jar
      - name: Package SprintMod JAR
        run: |
          jar cf build/libs/mods/SprintMod.jar -C mods-build/classes .
          echo "SprintMod.jar успешно собран!"

      # ─── Выгрузка Артефактов ─────────────────────────────────────────────

      - name: Upload modloader jar (no deps)
        uses: actions/upload-artifact@v4
        with:
          name: mc-161807-modloader
          path: build/libs/minecraft-rd-161807.jar

      - name: Upload fat jar (runnable, all deps included)
        uses: actions/upload-artifact@v4
        with:
          name: mc-161807-modloader-all
          path: build/libs/minecraft-rd-161807-all.jar

      # Новый артефакт: качай готовый спринт-мод отсюда!
      - name: Upload Compiled Mods
        uses: actions/upload-artifact@v4
        with:
          name: compiled-minecraft-mods
          path: build/libs/mods/*.jar

      - name: Upload natives (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: natives-macos
          path: run/natives/*.dylib
